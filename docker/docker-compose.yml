services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-sandbox
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "${TTYD_BIND:-127.0.0.1}:${TTYD_PORT:-7681}:7681"
    volumes:
      - .:/workspace:ro
      - ${PKM_VAULT_PATH:-./vault}:/workspace/vault:ro
      - ${PKM_VAULT_PATH:-./vault}/${PKM_WRITE_DIR:-agent-workspace}:/workspace/vault/${PKM_WRITE_DIR:-agent-workspace}:rw
      - sandbox-claude-config:/home/claude/.claude
      - sandbox-shell-history:/home/claude/.shell-history
    environment:
      - TERM=xterm-256color
      - TTYD_USER=${TTYD_USER:-}
      - TTYD_PASSWORD=${TTYD_PASSWORD:-}
      - ALLOWED_PRIVATE_HOSTS=${ALLOWED_PRIVATE_HOSTS:-}
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -so /dev/null -w '%{http_code}' http://localhost:7681/ | grep -qE '^(200|401)$'"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY:-8G}
          cpus: "${CONTAINER_CPUS:-4}"

volumes:
  sandbox-claude-config:
  sandbox-shell-history:
