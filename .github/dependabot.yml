version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope

  - package-ecosystem: npm
    directory: "/plugin"
    schedule:
      interval: daily
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "deps"
      include: scope
    open-pull-requests-limit: 10
