name: lint infra

# Static checks for the parts that the plugin's eslint/tsc don't cover:
# shell scripts in container/ and workspace/.claude/, the Dockerfile itself,
# and the GitHub Actions workflows. Bugs in these files are security-relevant
# (firewall rules, entrypoint privilege drop, release flow) and the plugin's
# CI would never catch them.

on:
  pull_request:
    paths:
      - "container/**"
      - "workspace/.claude/hooks/**"
      - "workspace/.claude/scripts/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "container/**"
      - "workspace/.claude/hooks/**"
      - "workspace/.claude/scripts/**"
      - ".github/workflows/**"
  workflow_dispatch: {}

# Top-level least-privilege fail-safe — any future job without an explicit
# permissions block inherits this rather than the repo default.
permissions: {}

concurrency:
  group: lint-infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck
        run: |
          # ubuntu-latest ships shellcheck. Run on every shell file we
          # control; fail on errors only (warnings are advisory).
          #
          # Match by extension OR shebang so extension-less entrypoints
          # don't silently skip. Use `-exec head -n1` to inspect the first
          # line; gathering by both criteria into a unique list.
          {
            find container/scripts container/configs \
                 workspace/.claude/hooks workspace/.claude/scripts \
              -type f \( -name '*.sh' -o -name '*.bash' \) -print
            find container/scripts container/configs \
                 workspace/.claude/hooks workspace/.claude/scripts \
              -type f ! -name '*.sh' ! -name '*.bash' \
              -exec sh -c 'head -1 "$1" | grep -qE "^#!.*\b(sh|bash)\b" && echo "$1"' _ {} \;
          } | sort -u | tee /tmp/shell-files
          if [ ! -s /tmp/shell-files ]; then
            echo "ERROR: shellcheck job found no shell files to check — paths or globs must have changed." >&2
            exit 1
          fi
          xargs -r -a /tmp/shell-files shellcheck -S error

  hadolint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: hadolint
        # SHA-pinned for supply-chain integrity (third-party action).
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: container/Dockerfile
          config: container/.hadolint.yaml
          # Project-specific ignores live in container/.hadolint.yaml with
          # justifications. Fail on warning so genuine new issues surface.
          failure-threshold: warning

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        # Pinned release + SHA256 verification. Replaces the previous
        # `curl | bash` install of actionlint's download script from a
        # moving `main` branch, which had no checksum and was a
        # supply-chain risk. When bumping ACTIONLINT_VERSION, recompute
        # the SHA256 from the release's asset digest.
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint
          ./actionlint -color
