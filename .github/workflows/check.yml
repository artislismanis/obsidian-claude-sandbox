name: plugin check

on:
  pull_request:
    paths:
      - "plugin/**"
      - ".github/workflows/check.yml"
  push:
    branches: [main]
    paths:
      - "plugin/**"
      - ".github/workflows/check.yml"

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache wdio's downloaded Obsidian + chromedriver tree. The cache key
      # is invalidated by changes to wdio.conf.mts (where the version
      # selection lives) or package-lock.json (which pins wdio itself).
      # Fine-grained per-Obsidian-version invalidation isn't worth the
      # complexity — a stale cache just means one extra download.
      - name: Cache Obsidian + chromedriver downloads
        uses: actions/cache@v5
        with:
          path: plugin/.obsidian-cache
          key: ${{ runner.os }}-obsidian-${{ hashFiles('plugin/wdio.conf.mts', 'plugin/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-obsidian-

      - name: Lint + format + type-check + unit tests
        run: npm run check

      - name: Build plugin (required for e2e)
        run: npm run build

      - name: Install xvfb for headless e2e
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: E2E smoke tests
        run: npm run test:e2e:headless
