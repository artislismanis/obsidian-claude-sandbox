name: plugin check

on:
  pull_request:
    paths:
      - "plugin/**"
      - ".github/workflows/check.yml"
  push:
    branches: [main]
    paths:
      - "plugin/**"
      - ".github/workflows/check.yml"

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Compute the Obsidian-cache key the same way wdio.conf.mts does, so a
      # cache miss only happens when wdio's downloaded versions change.
      # The `obsidian-cache-key:` line emitted at wdio config load is the
      # contract — see wdio.conf.mts for the source.
      - name: Compute obsidian-cache key
        id: obs-cache
        run: |
          KEY=$(node --eval 'import("./wdio.conf.mts").then(m => process.stdout.write(m.OBSIDIAN_CACHE_KEY ?? ""))' 2>/dev/null \
                 || npx --yes wdio config --print 2>/dev/null \
                 || true)
          # Fall back to a stable per-OS key if the helper isn't exposed —
          # the cache stays warm across runs without per-version invalidation.
          if [ -z "$KEY" ]; then KEY="ubuntu-obsidian-default"; fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Cache Obsidian + chromedriver downloads
        uses: actions/cache@v4
        with:
          path: plugin/.obsidian-cache
          key: ${{ runner.os }}-obsidian-${{ steps.obs-cache.outputs.key }}-${{ hashFiles('plugin/wdio.conf.mts', 'plugin/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-obsidian-

      - name: Lint + format + type-check + unit tests
        run: npm run check

      - name: Build plugin (required for e2e)
        run: npm run build

      - name: Install xvfb for headless e2e
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: E2E smoke tests
        run: npm run test:e2e:headless
