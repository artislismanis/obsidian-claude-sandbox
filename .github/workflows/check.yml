name: plugin check

# Runs on every PR and push to main — no `paths:` filter. Path filtering
# was tempting because the unit tests are fast but e2e is ~25s, but a
# path-filtered workflow can never be safely set as a required status
# check (a PR that touches only docs would block forever waiting on a
# status that never arrives). Keep the workflow unconditional and put
# any per-file optimisation inside the job if needed later.

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

# Top-level least-privilege fail-safe. Jobs override as needed.
permissions: {}

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache wdio's downloaded Obsidian + chromedriver tree. The cache key
      # is invalidated by changes to wdio.conf.mts (where the version
      # selection lives) or package-lock.json (which pins wdio itself).
      # Fine-grained per-Obsidian-version invalidation isn't worth the
      # complexity — a stale cache just means one extra download.
      - name: Cache Obsidian + chromedriver downloads
        # SHA-pinned to v5.0.5 — runs on Node 24, matching setup-node above.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: plugin/.obsidian-cache
          key: ${{ runner.os }}-obsidian-${{ hashFiles('plugin/wdio.conf.mts', 'plugin/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-obsidian-

      - name: Lint + format + type-check + unit tests
        run: npm run check

      - name: Build plugin (required for e2e)
        run: npm run build

      - name: Install xvfb for headless e2e
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: E2E smoke tests
        run: npm run test:e2e:headless
