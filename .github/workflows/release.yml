name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            plugin/dist/main.js
            plugin/dist/manifest.json
            plugin/dist/styles.css
