name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

# Top-level least-privilege fail-safe. The release job overrides with
# the perms it actually needs (contents: write for the GH Release).
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      # SLSA build-provenance attestation (the Sigstore-rooted alternative
      # to PGP-signing SHA256SUMS). Lets users verify with
      # `gh attestation verify` that the artifact was produced by this
      # workflow run, not tampered after the fact.
      id-token: write
      attestations: write
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest.json, versions.json, and package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          MANIFEST_MIN=$(node -p "require('./manifest.json').minAppVersion")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            echo "Run \`npm version $TAG_VERSION\` (or update package.json manually so version-bump can sync the rest)."
            exit 1
          fi
          if ! jq -e --arg v "$TAG_VERSION" 'has($v)' versions.json > /dev/null; then
            echo "versions.json is missing an entry for $TAG_VERSION"
            echo "Run \`npm version $TAG_VERSION\` (or update versions.json manually) so BRAT and Obsidian know which app version this plugin requires."
            exit 1
          fi
          # versions.json[tag] is the minAppVersion that this plugin
          # release requires. It MUST match manifest.json.minAppVersion —
          # otherwise BRAT and Obsidian would disagree about which Obsidian
          # build is the floor, and one of them would silently apply the
          # wrong gate. version-bump.mjs keeps these in sync; this is the
          # CI guard against a hand-edited release path.
          VERSIONS_MIN=$(jq -r --arg v "$TAG_VERSION" '.[$v]' versions.json)
          if [ "$VERSIONS_MIN" != "$MANIFEST_MIN" ]; then
            echo "versions.json[$TAG_VERSION]=$VERSIONS_MIN does not match manifest.minAppVersion=$MANIFEST_MIN"
            exit 1
          fi

      - name: Build
        run: npm run build

      # Generate SHA256SUMS for the three release artifacts so users (and
      # downstream tooling like BRAT) can verify what they downloaded
      # against what we actually shipped. The file is uploaded alongside
      # the artifacts in the Release-creation step below.
      - name: Compute artifact checksums
        run: |
          cd dist
          sha256sum main.js manifest.json styles.css > SHA256SUMS
          cat SHA256SUMS

      # Sign the three release artifacts (not SHA256SUMS — the attestation
      # IS the signed root of trust). Verify with:
      #   gh attestation verify <file> --repo <owner>/<repo>
      - name: Attest build provenance
        # SHA-pinned: a moving major-tag pin on the action that signs
        # releases is a supply-chain liability — a tag re-push would
        # compromise every future release signature with no rollback.
        # SHA is v3.2.0 — keep comment in sync when bumping.
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f  # v3.2.0
        with:
          subject-path: |
            plugin/dist/main.js
            plugin/dist/manifest.json
            plugin/dist/styles.css

      - name: Create GitHub Release
        # SHA is v2.6.2 — keep comment in sync when bumping.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          name: ${{ github.ref_name }}
          draft: false
          # Pre-release flag is repo-variable controlled. Default is STABLE:
          # set `RELEASE_PRERELEASE=true` (Settings → Secrets and variables →
          # Actions → Variables) to mark a release as pre-release. Previously
          # the default was pre-release (only `=false` flipped it), which
          # meant a missing/typo'd variable silently shipped every release as
          # pre-release and hid them from BRAT's stable channel.
          prerelease: ${{ vars.RELEASE_PRERELEASE == 'true' }}
          generate_release_notes: true
          files: |
            plugin/dist/main.js
            plugin/dist/manifest.json
            plugin/dist/styles.css
            plugin/dist/SHA256SUMS
