name: link check

# Verify intra-repo and external links in the docs don't rot. This catches
# the doc-drift class of bugs ("docs link to a renamed file") that prior
# audit rounds repeatedly turned up.

on:
  pull_request:
    paths:
      - "**.md"
      - ".github/workflows/links.yml"
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/links.yml"
  schedule:
    # Weekly external-link sweep — catches upstream URL changes between
    # commits.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

# Top-level least-privilege fail-safe.
permissions: {}

concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: lychee
        # SHA-pinned (third-party action).
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          # Only exclude api.github.com (rate-limited) and a couple of
          # hosts that consistently fail lychee's anchor checks. Repo
          # links under github.com/<owner>/<repo> remain checkable so we
          # catch the typical doc-drift bug. Drop 429 from --accept — a
          # 429 means "couldn't tell", which silently passes broken
          # links if rate limits hit.
          args: >-
            --no-progress
            --max-concurrency 4
            --exclude '^https?://api\.github\.com/'
            --exclude '^https?://github\.com/[^/]+/[^/]+/(issues|pull|discussions|commit)/'
            --exclude '^https?://anthropic\.com/'
            --exclude 'https?://claude\.ai/'
            --accept 200,206,301,302,307,308
            **/*.md
          fail: true
