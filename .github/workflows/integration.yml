name: integration tests

# Runs the plugin's integration tests (vitest, hits a real container).
# These cover container behaviour + MCP integration that the unit suite
# can only mock. Heavier than `check.yml` because it builds the image,
# so it runs on PRs that touch the plugin or container only.
#
# The Claude-Code subsuite is skipped in CI — it requires authenticating
# Claude inside the container, which needs interactive setup. See
# `docs/testing.md` for the local-dev path.

on:
  pull_request:
    paths:
      - "plugin/**"
      - "container/**"
      - ".github/workflows/integration.yml"
  push:
    branches: [main]
    paths:
      - "plugin/**"
      - "container/**"
      - ".github/workflows/integration.yml"
  workflow_dispatch: {}

# Top-level least-privilege fail-safe.
permissions: {}

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Capture the runner's UID/GID so the built image's `claude` user
      # matches the bind-mount ownership. Without this, the test compose
      # (which mirrors prod's `cap_drop: ALL` + `NET_ADMIN/NET_RAW`-only
      # cap_add) cannot CHOWN/FOWNER the bind-mounted vault subdirs from
      # uid 1001 (runner) to 1000 (default CLAUDE_UID) — the dropped
      # caps make root-inside-container powerless to rewrite ownership.
      # Aligning at build time sidesteps the entrypoint chown path
      # entirely.
      - name: Capture runner UID/GID
        id: runner_ids
        working-directory: ${{ github.workspace }}
        run: |
          echo "uid=$(id -u)" >> "$GITHUB_OUTPUT"
          echo "gid=$(id -g)" >> "$GITHUB_OUTPUT"

      # Buildx with GHA cache so we don't re-download Node, ttyd, atuin,
      # apt mirrors etc. on every PR run. Cold build is ~5 min; warm cache
      # cuts that to ~30s when the Dockerfile is unchanged. The base images
      # are pinned by digest so cache invalidation is deterministic.
      - name: Set up Docker Buildx
        # buildx-action v3 — pinned by SHA to defend against tag re-pushes
        # (same policy as other third-party actions in this repo).
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Build the sandbox image that integration tests run against.
      # `globalSetup.ts` checks for `oas-sandbox:latest` and skips if
      # missing; we want the suite to run, not skip. `load: true` is
      # required so the image is available to `docker compose up` later
      # (buildx defaults to the build cache, not the local image store).
      # Cache scope is keyed on UID so distinct runner UIDs don't share
      # an image (the `claude` user is baked into the image).
      - name: Build sandbox image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: container
          file: container/Dockerfile
          tags: oas-sandbox:latest
          load: true
          build-args: |
            CLAUDE_UID=${{ steps.runner_ids.outputs.uid }}
            CLAUDE_GID=${{ steps.runner_ids.outputs.gid }}
          cache-from: type=gha,scope=oas-sandbox-uid${{ steps.runner_ids.outputs.uid }}
          cache-to: type=gha,mode=max,scope=oas-sandbox-uid${{ steps.runner_ids.outputs.uid }}

      - name: Integration tests
        # The Claude-Code subsuite auto-skips here — `globalSetup.ts`
        # only runs it when there's auth in the test volume, which CI
        # doesn't have. Other suites (container, container-advanced,
        # mcp-integration) run against the built image.
        run: npm run test:integration
