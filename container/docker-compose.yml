name: oas

services:
  sandbox:
    image: oas-sandbox:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Match the container's claude user to the host user so bind
        # mounts are writable. Default to 1000 (first user on most
        # Linux / WSL2 hosts). Override in .env if `id -u` on the host
        # returns something else.
        CLAUDE_UID: "${CLAUDE_UID:-1000}"
        CLAUDE_GID: "${CLAUDE_GID:-1000}"
    container_name: oas-sandbox
    # Drop the full default cap set, then re-add only what we need:
    # NET_ADMIN — iptables/ipset rules in init-firewall.sh
    # NET_RAW   — required by iptables to open raw sockets when loading
    #             the OUTPUT/filter chains; without it `iptables -A OUTPUT`
    #             fails with "Permission denied (you must be root)" even
    #             though uid 0 is in effect.
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Defence in depth: prevent setuid/setgid binaries inside the container
    # from gaining privileges (e.g. via a future image bump that adds one).
    # Has no effect on the existing sudo+gosu flow since those run via the
    # entrypoint as uid 0 before priv-drop.
    security_opt:
      - no-new-privileges:true
    # Use Docker's tini-equivalent as PID 1 so orphaned children of long-lived
    # claude/tmux sessions are reaped instead of accumulating against the
    # 512-pid cap below.
    init: true
    # File-descriptor cap. (pids cap lives under deploy.resources.limits.pids
    # below — compose v2 rejects setting both pids_limit and that key.)
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    # Cap the JSON log driver so a chatty session can't fill the host disk
    # with `docker logs`. Three 10MB rotated files = 30MB ceiling per
    # container.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${TTYD_BIND:-127.0.0.1}:${TTYD_PORT:-7681}:7681"
    volumes:
      # Claude's workspace — rw, becomes the in-container cwd
      - ../workspace:/workspace:rw
      # Vault — read-only overlay inside workspace
      - ${PKM_VAULT_PATH:-../vault}:/workspace/vault:ro
      # Writable vault subfolder — rw overlay
      - ${PKM_VAULT_PATH:-../vault}/${PKM_WRITE_DIR:-agent-workspace}:/workspace/vault/${PKM_WRITE_DIR:-agent-workspace}:rw
      # Vault infrastructure — rw overlay, independent of write directory
      - ${PKM_VAULT_PATH:-../vault}/.oas:/workspace/vault/.oas:rw
      # Host-managed firewall allowlist extras — read-only; Claude cannot
      # see or modify this path. Mount target lives outside /workspace so
      # it's not reachable through the vault read tools either.
      - ./firewall-extras.txt:/etc/oas/firewall-extras.txt:ro
      # Named volumes (OAS-prefixed)
      - oas-claude-config:/home/claude/.claude
      - oas-shell-history:/home/claude/.shell-history
    environment:
      - TERM=xterm-256color
      - ALLOWED_PRIVATE_HOSTS=${ALLOWED_PRIVATE_HOSTS:-}
      - PKM_WRITE_DIR=${PKM_WRITE_DIR:-agent-workspace}
      # MEMORY_FILE_PATH derives from MEMORY_FILE_NAME — keep the default in
      # one place so both keys can't drift apart if the default ever changes.
      - MEMORY_FILE_NAME=${MEMORY_FILE_NAME:-memory.json}
      - MEMORY_FILE_PATH=/workspace/vault/.oas/${MEMORY_FILE_NAME:-memory.json}
      - SUDO_PASSWORD=${SUDO_PASSWORD:-}
      - TTYD_PORT=${TTYD_PORT:-7681}
      - OAS_MCP_TOKEN=${OAS_MCP_TOKEN:-}
      - OAS_MCP_PORT=${OAS_MCP_PORT:-28080}
      - OAS_HOST_IP=${OAS_HOST_IP:-}
      - OAS_ALLOWED_DOMAINS=${OAS_ALLOWED_DOMAINS:-}
    sysctls:
      # IPv6 disabled — simplifies firewall (IPv4-only rules) and matches
      # common local network configs. All allowlisted domains resolve A records.
      - net.ipv6.conf.all.disable_ipv6=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    healthcheck:
      # $$TTYD_PORT is escaped so compose passes a literal $TTYD_PORT into the
      # healthcheck shell, where it expands against the container's env
      # (set by the TTYD_PORT key above) instead of the host shell.
      # `-fL` follows redirects and treats any non-2xx (after redirect) as an
      # error via curl's own exit code — tolerates a future ttyd 301/302.
      test: ["CMD-SHELL", "curl -fsSL -o /dev/null \"http://localhost:$$TTYD_PORT/\""]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY:-8G}
          cpus: "${CONTAINER_CPUS:-4}"
          # 512 is well above what a Claude session + ttyd + tmux + a
          # few MCP servers needs in practice, while still bounding
          # fork-bomb-style runaway loops.
          pids: 512

networks:
  default:
    driver: bridge
    driver_opts:
      # Default true (Docker's normal behavior). Plugin sets OAS_IP_MASQ=false
      # in WSL mirrored mode so container source IPs reach Windows un-NAT'd
      # and match the Hyper-V firewall allowlist (172.16.0.0/12). In NAT mode
      # leaving masquerade on is required — Windows has no return route to the
      # docker bridge subnets.
      # NOTE: driver_opts only take effect on network creation — switching
      # modes requires `docker compose down && docker compose up -d` so the
      # network is recreated with the new opt.
      com.docker.network.bridge.enable_ip_masquerade: "${OAS_IP_MASQ:-true}"

volumes:
  oas-claude-config:
  oas-shell-history:
